<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; padding: 12px; font-family: sans-serif; }
    h2 { margin: 0 0 8px; font-size: 16px; }
    #activeChat { font-weight: bold; margin-bottom: 4px; font-size: 13px; color: #007bff; }
    #count { color: #666; font-size: 13px; margin-bottom: 10px; }
    button {
      width: 100%; padding: 10px; font-size: 14px;
      color: white; border: none;
      border-radius: 6px; cursor: pointer;
    }
    #scrollBtn { background: #007bff; margin-bottom: 8px; }
    #scrollBtn:hover { background: #0056b3; }
    #scrollBtn.scrolling { background: #dc3545; }
    #scrollBtn.scrolling:hover { background: #bd2130; }
    #downloadBtn { background: #25D366; }
    #downloadBtn:hover { background: #1da851; }
    #clearBtn { background: #6c757d; margin-top: 8px; }
    #clearBtn:hover { background: #5a6268; }
    #status { margin-top: 8px; font-size: 12px; color: #333; }
  </style>
</head>
<body>
  <h2>Vetlog Scraper</h2>
  <div id="activeChat">Active Chat: None</div>
  <div id="count">Messages captured: 0</div>
  <button id="scrollBtn">Auto-Scroll Up & Scrape</button>
  <button id="downloadBtn">Download as TXT</button>
  <button id="clearBtn">Clear Captured Messages</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
