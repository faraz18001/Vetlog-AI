<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>{{title}}</title>
<style>
  body { font-family: 'Segoe UI', Arial, sans-serif; max-width: 820px; margin: 48px auto; padding: 0 24px; color: #1a1a1a; line-height: 1.7; }
  h1, h2, h3 { font-weight: 600; margin-top: 1.5em; }
  h2 { font-size: 1.5rem; border-bottom: 2px solid #e5e5e5; padding-bottom: 8px; }
  table { width: 100%; border-collapse: collapse; margin: 1.25em 0; font-size: 0.9rem; }
  th { background: #f4f4f5; font-weight: 600; text-align: left; padding: 10px 14px; border: 1px solid #d4d4d8; }
  td { padding: 8px 14px; border: 1px solid #e4e4e7; vertical-align: top; }
  tr:nth-child(even) td { background: #fafafa; }
  hr { border: none; border-top: 1px solid #e5e5e5; margin: 2em 0; }
  em { color: #71717a; font-size: 0.875rem; }
  code { background: #f4f4f5; padding: 2px 6px; border-radius: 4px; }
</style>
</head>
<body>
{{body_html}}
</body>
</html>
